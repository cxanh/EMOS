# node identity
node:
  id: node001
  hostname: dev-machine
  display_name: My Laptop

# backend service
server:
  url: http://localhost:50001
  register_endpoint: /api/agent/register
  metrics_endpoint: /api/agent/metrics

# collection config
collection:
  interval: 1
  retry: 3
  timeout: 5

# logging
logging:
  level: INFO
  file: agent.log
