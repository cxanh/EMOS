# 节点信息
node:
  id: node001
  hostname: dev-machine

# 中心服务地址
server:
  url: http://localhost:50001
  register_endpoint: /api/agent/register
  metrics_endpoint: /api/agent/metrics

# 采集配置
collection:
  interval: 1  # 采集间隔(秒)
  retry: 3     # 重试次数
  timeout: 5   # 超时时间(秒)

# 日志配置
logging:
  level: INFO
  file: agent.log
